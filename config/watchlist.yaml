# ここに自分が気になる銘柄を登録してください。
#
# symbol: 株価取得に使うティッカーコード（Yahoo Financeの表記に合わせる）
#   - 日本株: 証券コード + ".T"（例: トヨタ自動車 = "7203.T"）
#   - 米国株: そのままのティッカー（例: Apple = "AAPL"）
#   - ETF/投資信託: 上場ETFのティッカー（例: S&P500連動ETF = "VOO" や "1655.T"）
# name: レポートに表示する銘柄名（日本語でOK）
# market: "JP" / "US" / "ETF" など、分類用のラベル（自由記述）
# nisa_growth_eligible: NISA成長投資枠の対象になりやすいかどうかの目安（true/false）
#   多くの個別株・通常のETFは対象ですが、レバレッジ型・インバース型ETFなどは対象外です。
#   ※ あくまで目安タグです。正式な対象可否は証券会社側で必ず確認してください。
#
# 銘柄はいくつでも追加できます。ただし増やすほど処理時間とニュース取得件数が増えるので、
# まずは10〜20銘柄程度から始めることをおすすめします。
#
# なお、世界情勢をヒントにした「自分では気づいていないハイリスク銘柄」の候補は
# config/candidate_pool.yaml で別枠管理しています。こちらは自分で選んだ銘柄専用です。

tickers:
  - symbol: "7203.T"
    name: "トヨタ自動車"
    market: "JP"
    nisa_growth_eligible: true

  - symbol: "9984.T"
    name: "ソフトバンクグループ"
    market: "JP"
    nisa_growth_eligible: true

  - symbol: "AAPL"
    name: "Apple"
    market: "US"
    nisa_growth_eligible: true

  - symbol: "NVDA"
    name: "NVIDIA"
    market: "US"
    nisa_growth_eligible: true

  - symbol: "1655.T"
    name: "S&P500連動ETF (iシェアーズ)"
    market: "ETF"
    nisa_growth_eligible: true
