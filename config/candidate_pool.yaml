# 「自分では気づいていないが、世界情勢的に注目度が上がっているかもしれない」
# ハイリスク・テーマ株の候補プールです。
#
# ここに登録した銘柄はすべて毎日Gemini APIで分析され、レポート内の
# 「注目テーマ銘柄（ハイリスク候補）」セクションに買い/売りスコア付きで表示されます。
# watchlist.yaml（自分専用の銘柄）とは別枠として扱われます。
#
# AIは、このリストに実在しない銘柄コードを追加することはありません
# （リストの追加・削除は必ず人間が行い、ティッカーコードの実在確認をした上で登録してください）。
#
# 各項目の意味:
#   symbol: ティッカーコード
#   name: 表示名
#   market: "JP" / "US"
#   theme: どんなテーマに属するか（世界情勢との紐付けの手がかりとしてAIに渡される）
#   risk_level: "high" 固定（このプールは高リスク銘柄用のため）
#   nisa_growth_eligible: NISA成長投資枠の対象になりやすいかどうかの目安
#     （レバレッジ型・インバース型ETFなどは対象外になるため false）
#     ※ 正式な対象可否は必ず証券会社側で確認してください。

