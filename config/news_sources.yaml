# 個別銘柄のニュースとは別に、相場全体に影響する「世界情勢・マクロ経済」の
# ニュースを拾うための検索キーワード一覧です。
# Google News RSS検索（https://news.google.com/rss/search?q=...）に
# そのままクエリとして渡されます。自由に追加・削除してください。

macro_queries:
  - "日銀 金融政策"
  - "FRB 利上げ 利下げ"
  - "為替 円安 円高"
  - "原油価格"
  - "米国 株式市場"
  - "日経平均 株価"
  - "地政学リスク"

# 1クエリあたり何件のマクロニュースを取得するか
max_articles_per_query: 3

# 個別銘柄1件あたり何件のニュースを取得するか
max_articles_per_ticker: 5
